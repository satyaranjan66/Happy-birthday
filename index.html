<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Birthday Surprise - Satya Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap');

        body {
            margin: 0; background: #000; overflow: hidden;
            font-family: 'Poppins', sans-serif; color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh;
        }
        #gift-open {
            color: #ffd700; font-weight: bold; position: absolute; bottom: 20%;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* --- 3D Box --- */
        .box-container {
            position: relative; width: 140px; height: 140px;
            transform-style: preserve-3d; cursor: pointer;
            animation: rotateBox 6s infinite linear; z-index: 50;
        }
        @keyframes rotateBox { 
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }
        .side {
            position: absolute; width: 140px; height: 140px;
            background: linear-gradient(135deg, #ff0050, #ff4d94);
            border: 2px solid #ffd700; display: flex;
            justify-content: center; align-items: center; font-size: 50px;
        }
        .front { transform: translateZ(70px); }
        .back { transform: rotateY(180deg) translateZ(70px); }
        .left { transform: rotateY(-90deg) translateZ(70px); }
        .right { transform: rotateY(90deg) translateZ(70px); }
        .top { transform: rotateX(90deg) translateZ(70px); background: #ff4d94; }
        .bottom { transform: rotateX(-90deg) translateZ(70px); }

        /* --- Scattered Cards --- */
        .card {
            position: absolute; width: 110px; height: 140px;
            background: #fff; color: #333; border-radius: 10px;
            padding: 10px; font-size: 9px; text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            display: none; cursor: pointer; z-index: 100;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #ff0050; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .card:hover { transform: scale(1.5) !important; z-index: 500; border-width: 3px; }

        /* --- Full Screen Overlay --- */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 1000; display: none;
            justify-content: center; align-items: center; padding: 20px;
        }
        .big-card-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .big-card {
            background: #fff; color: #333; padding: 30px; border-radius: 20px;
            max-width: 300px; text-align: center; font-size: 1.2rem;
            font-family: 'Dancing Script', cursive; border: 5px solid #ff0050;
            line-height: 1.5; white-space: pre-line;
            box-shadow: 0 0 30px rgba(255, 0, 80, 0.5);
        }

        .credits { text-align: center; color: white; font-family: 'Poppins', sans-serif; }
        .made-by { font-size: 14px; letter-spacing: 1px; opacity: 0.9; }
        .feedback-link {
            color: #ff4d94; text-decoration: none; font-size: 12px;
            font-weight: bold; border-bottom: 1px solid #ff4d94;
            display: inline-block; margin-top: 5px;
        }

        .instruction { position: absolute; top: 30px; font-size: 18px; color: #ffd700; text-align: center; font-weight: bold; width: 90%; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <audio id="bdayMusic" loop preload="auto">
        <source src="bday.mp3" type="audio/mpeg">
    </audio>

    <div class="instruction" id="wishHeader">🎁 Happy Birthday! 🎁</div>

    <div class="box-container" id="giftBox" onclick="explode()">
        <div class="side front">🎁</div><div class="side back">🎁</div>
        <div class="side left">🎁</div><div class="side right">🎁</div>
        <div class="side top">🎀</div><div class="side bottom"></div>
    </div>
    <div id="gift-open">tap to open gift</div>

    <div id="overlay" onclick="closeOverlay()">
        <div class="big-card-container" onclick="event.stopPropagation()">
            <div class="big-card" id="bigCardText"></div>
            <div class="credits">
                <div class="made-by">Made by <b>Satya Chouhan</b></div>
                <a href="https://www.instagram.com/__crazy__king__satya__?igsh=cXA5MW5jNmhwZnY4" class="feedback-link" target="_blank">📩 Send Feedback</a>
            </div>
            <div style="font-size: 10px; color: white; opacity: 0.5; margin-top: 10px;">Tap anywhere to close</div>
        </div>
    </div>

    <script>
        // --- URL Parameter Logic ---
        const urlParams = new URLSearchParams(window.location.search);
        let personName = urlParams.get('name') || "Dost";

        // Update main header
        document.getElementById('wishHeader').innerText = `🎁 I wish you very happy birthday ${personName} 🎁`;

        // --- 28 Unique Shayaris ---
        const shayaris = [
            `Khuda se kya maangu tere vaaste ${personName},\nSada khushiyon se bhare hon tere raaste!`,
            `Phoolon ne amrit ka jaam bheja hai,\nSuraj ne aasmaan se salaam bheja hai, Mubarak ho ${personName}!`,
            `Ugte hue suraj se dua maangi hai,\nAapke liye humne dil se vafa maangi hai ${personName}.`,
            `Zindagi ki kuch khushiyan mubarak ho,\nAapko naye naye khwaab mubarak ho ${personName}!`,
            `Har rah aasan ho, har rah pe khushiyan ho,\nHar din haseen ho, har pal mein rang ho!`,
            `Tamannaon se bhari ho zindagi aapki,\nKhwahishon se bhara ho har pal aapka ${personName}.`,
            `Dua hai ki kamyabi ke har shikhar par aapka naam होगा,\nAapke har kadam par duniya ka salaam hoga!`,
            `Aapki pasand hamari chahat ban jaye,\nAapki muskurahat dil ki rahat ban jaye ${personName}.`,
            `Sajti rahe khushiyon ki mehfil aapki,\nHar pal ho suhana aur maza aaye!`,
            `Aap wo phool ho jo gulshan mein nahi khilte,\nPar jiske liye aasman ke farishte bhi taraste hain.`,
            `Suraj ki kiranon sa tej ho aapka,\nChand ki chandni sa sukoon ho aapka ${personName}.`,
            `Khushiyon ka ek sansar miley aapko,\nApno se dher saara pyaar miley aapko.`,
            `Janamdin ke ye khaas lamhe mubarak,\nAankhon mein base naye khwaab mubarak ${personName}!`,
            `Har saal ye din dhoom-dhaam se aaye,\nAapki zindagi mein hazaron khushiyan laye.`,
            `Khuda kare aapki har tamanna puri ho jaye,\nAapka har khwaab haqiqat ban jaye ${personName}.`,
            `Aap jiyo hazaron saal,\nSaal ke din hon pachaas hazar, Happy Birthday!`,
            `Zindagi ki bahaar bani rahe aapke saath,\nKhushiyon ka tyohaar bani rahe aapke saath.`,
            `Phoolon ki vadiyon mein ho basera aapka,\nSitaron ke aangan mein ho ghar aapka ${personName}.`,
            `Mubarak ho aapko ye naya saal,\nZindagi mein miley dher saara kamal!`,
            `Aapki muskurahat hamesha yuhi khilti rahe,\nZindagi ki har nemat aapko milti rahe.`,
            `Chaand se pyaari chandni, Chandni se pyaari raat,\nRaat se pyaari zindagi, Aur zindagi se pyaari aap!`,
            `Baar baar din ye aaye, Baar baar dil ye gaaye,\nTu jiye hazaron saal, Yahi hai meri aarzoo!`,
            `Khushiyon ka ek darya ho aapke paas,\nHar sapna haqiqat ho aapke paas ${personName}.`,
            `Aapki aankhon mein saje hon jo bhi sapne,\nYe janamdin unhe sach kar dikhaye!`,
            `Zindagi ki har mod pe miley dher saara pyaar,\nHar din ho khushiyon ka tyohaar ${personName}.`,
            `Deepak ki lau si roshan rahe zindagi,\nPhoolon ki mehek si mehke zindagi!`,
            `Suraj ki pehli kiran aapko salaam de,\nPhoolon ki khushbu aapko paigaam de ${personName}.`,
            `Pyaar se bhara ho har pal aapka,\nKhushiyon se bhara ho har din aapka ${personName}!`
        ];

        function explode() {
            const box = document.getElementById('giftBox');
            const giftText = document.getElementById('gift-open');
            const music = document.getElementById('bdayMusic');
            
            // Start music
            music.play().catch(e => console.log("Audio play blocked by browser."));

            box.style.display = 'none';
            giftText.style.display = 'none';

            // Create 28 cards
            shayaris.forEach((text, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.display = 'flex';
                card.innerHTML = `<b>Wish ${i + 1}</b><br><br>Click to read for ${personName}...`;
                
                // Random explosion physics
                const angle = Math.random() * Math.PI * 2;
                const dist = 70 + Math.random() * 300;
                const x = Math.cos(angle) * dist;
                const y = Math.sin(angle) * dist;
                const rot = (Math.random() - 0.5) * 80;
                
                document.body.appendChild(card);

                setTimeout(() => { 
                    card.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`; 
                }, 100);
                
                card.onclick = (e) => { 
                    e.stopPropagation(); 
                    showFull(text); 
                };
            });
        }

        function showFull(text) {
            document.getElementById('bigCardText').innerText = text;
            document.getElementById('overlay').style.display = 'flex';
        }

        function closeOverlay() { 
            document.getElementById('overlay').style.display = 'none'; 
        }
    </script>
</body>
</html>
