<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta Story Pro Editor </title>
    <style>
        :root { --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        
        #capture-area {
            width: 320px; height: 560px; background: #000; border-radius: 15px;
            position: relative; overflow: hidden; border: 2px solid #333;
            display: flex; align-items: center; justify-content: center;
        }

        .header { position: absolute; top: 15px; left: 12px; display: flex; align-items: center; gap: 10px; z-index: 100; }
        .dp { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; }
        #user-display { font-weight: 700; font-size: 14px; text-shadow: 1px 1px 4px rgba(0,0,0,0.8); }

        /* Media styling with dynamic scale */
        #media-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: absolute; }
        #main-video, #main-img { max-width: none; transition: transform 0.1s; }
        
        .draggable-text {
            position: absolute; color: #fff; font-weight: bold; z-index: 100; 
            cursor: move; text-shadow: 0px 2px 8px rgba(0,0,0,0.8); user-select: none;
            white-space: nowrap;
        }
        
        #drag-mention { top: 200px; left: 60px; font-size: 24px; }
        #drag-custom { top: 300px; left: 40px; font-size: 20px; }

        .controls { margin-top: 15px; background: #222; padding: 15px; border-radius: 15px; width: 320px; box-sizing: border-box; }
        .control-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; display: flex; justify-content: space-between; }
        input[type="text"], input[type="file"], select { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: #e6683c; cursor: pointer; }
        
        .btn { background: var(--ig-gradient); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { font-size: 12px; color: #00ffcc; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="capture-area">
        <div id="media-container">
            <video id="main-video" loop playsinline crossorigin="anonymous" style="display:none;"></video>
            <img id="main-img" src="https://via.placeholder.com/1080x1920" style="display:block;">
        </div>
        
        <div class="header">
            <img src="https://via.placeholder.com/50" class="dp" id="dp-preview">
            <span id="user-display">Your_Name</span>
        </div>

        <div class="draggable-text" id="drag-mention">@<span id="mention-display">mention_id</span></div>
        <div class="draggable-text" id="drag-custom"><span id="custom-display">Story Text Here</span></div>
    </div>

    <div class="controls">
        <div class="control-group">
            <input type="text" id="user-in" placeholder="User Name" oninput="sync()">
            <input type="text" id="mention-in" placeholder="Mention @..." oninput="sync()">
            <input type="text" id="custom-in" placeholder="Custom Text..." oninput="sync()">
        </div>

        <div class="control-group">
            <label>Media Size (Zoom) <span id="val-media">100%</span></label>
            <input type="range" id="media-size" min="20" max="250" value="100" oninput="sync()">
            
            <label>Mention Size <span id="val-mention">24px</span></label>
            <input type="range" id="mention-size" min="10" max="80" value="24" oninput="sync()">
            
            <label>Text Size <span id="val-custom">20px</span></label>
            <input type="range" id="custom-size" min="10" max="80" value="20" oninput="sync()">
        </div>

        <div class="control-group">
            <label>Download Duration</label>
            <select id="record-time">
                <option value="5000">5 Seconds</option>
                <option value="10000">10 Seconds</option>
                <option value="15000">15 Seconds</option>
                <option value="30000">30 Seconds</option>
                <option value="60000">60 Seconds (1 Min)</option>
            </select>
        </div>

        <label>Files</label>
        <input type="file" accept="image/*" onchange="loadDP(event)">
        <input type="file" accept="image/*,video/*" onchange="loadMedia(event)">
        
        <button class="btn" onclick="recordVideo()">Download Video</button>
        <p id="status">Ready...</p>
    </div>

    <canvas id="recorder-canvas" width="320" height="560" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('main-video');
        const img = document.getElementById('main-img');
        const canvas = document.getElementById('recorder-canvas');
        const ctx = canvas.getContext('2d');
        const dpImg = document.getElementById('dp-preview');
        let isVideoMode = false;

        function sync() {
            document.getElementById('user-display').innerText = document.getElementById('user-in').value || "Your_Name";
            document.getElementById('mention-display').innerText = document.getElementById('mention-in').value || "mention_id";
            document.getElementById('custom-display').innerText = document.getElementById('custom-in').value || "Story Text Here";
            
            // Sizes
            const mSize = document.getElementById('mention-size').value;
            const cSize = document.getElementById('custom-size').value;
            const mediaScale = document.getElementById('media-size').value / 100;

            document.getElementById('drag-mention').style.fontSize = mSize + 'px';
            document.getElementById('drag-custom').style.fontSize = cSize + 'px';
            document.getElementById('main-video').style.transform = `scale(${mediaScale})`;
            document.getElementById('main-img').style.transform = `scale(${mediaScale})`;

            // Labels update
            document.getElementById('val-media').innerText = Math.round(mediaScale * 100) + '%';
            document.getElementById('val-mention').innerText = mSize + 'px';
            document.getElementById('val-custom').innerText = cSize + 'px';
        }

        function loadDP(e) { 
            const reader = new FileReader();
            reader.onload = (event) => dpImg.src = event.target.result;
            reader.readAsDataURL(e.target.files[0]);
        }

        function loadMedia(e) {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            if(file.type.includes('video')) {
                video.src = url; video.style.display = "block"; img.style.display = "none";
                video.play(); isVideoMode = true;
            } else {
                img.src = url; img.style.display = "block"; video.style.display = "none";
                isVideoMode = false;
            }
        }

        async function recordVideo() {
            const status = document.getElementById('status');
            const duration = parseInt(document.getElementById('record-time').value);
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'insta_story.webm';
                a.click();
                status.innerText = "Downloaded!";
            };

            const drawLoop = () => {
                const mediaScale = document.getElementById('media-size').value / 100;
                
                // Clear background
                ctx.fillStyle = "black";
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw Background Media with Scale
                const currentMedia = isVideoMode ? video : img;
                const sw = canvas.width * mediaScale;
                const sh = canvas.height * mediaScale;
                const sx = (canvas.width - sw) / 2;
                const sy = (canvas.height - sh) / 2;
                ctx.drawImage(currentMedia, sx, sy, sw, sh);
                
                // Draw Header
                ctx.save();
                ctx.beginPath(); ctx.arc(30, 32, 17, 0, Math.PI * 2); ctx.clip();
                ctx.drawImage(dpImg, 13, 15, 34, 34);
                ctx.restore();
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.fillText(document.getElementById('user-display').innerText, 55, 37);

                const boxRect = document.getElementById('capture-area').getBoundingClientRect();

                // Draw Mention
                const mSticker = document.getElementById('drag-mention');
                const mRect = mSticker.getBoundingClientRect();
                const mSize = document.getElementById('mention-size').value;
                ctx.font = `bold ${mSize}px Arial`;
                ctx.fillText("@" + document.getElementById('mention-display').innerText, mRect.left - boxRect.left, (mRect.top - boxRect.top) + parseInt(mSize) * 0.8);

                // Draw Custom Text
                const cSticker = document.getElementById('drag-custom');
                const cRect = cSticker.getBoundingClientRect();
                const cSize = document.getElementById('custom-size').value;
                ctx.font = `bold ${cSize}px Arial`;
                ctx.fillText(document.getElementById('custom-display').innerText, cRect.left - boxRect.left, (cRect.top - boxRect.top) + parseInt(cSize) * 0.8);
                
                if(recorder.state === 'recording') requestAnimationFrame(drawLoop);
            };

            recorder.start();
            drawLoop();
            status.innerText = `Recording ${duration/1000}s...`;
            setTimeout(() => recorder.stop(), duration);
        }

        function makeDraggable(el) {
            const box = document.getElementById('capture-area');
            const move = (e) => {
                e.preventDefault();
                let cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                let r = box.getBoundingClientRect();
                el.style.left = (cx - r.left - (el.offsetWidth/2)) + 'px';
                el.style.top = (cy - r.top - (el.offsetHeight/2)) + 'px';
            };
            el.addEventListener('touchstart', () => document.addEventListener('touchmove', move, {passive:false}));
            document.addEventListener('touchend', () => document.removeEventListener('touchmove', move));
            el.addEventListener('mousedown', () => document.addEventListener('mousemove', move));
            document.addEventListener('mouseup', () => document.removeEventListener('mousemove', move));
        }

        makeDraggable(document.getElementById('drag-mention'));
        makeDraggable(document.getElementById('drag-custom'));
    </script>
</body>
</html>
