<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta Story Fixed</title>
    <style>
        :root { --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        body { font-family: -apple-system, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        
        /* Story Box */
        #capture-area {
            width: 320px; height: 560px; background: #000; border-radius: 15px;
            position: relative; overflow: hidden; border: 2px solid #333;
        }

        .header { position: absolute; top: 12px; left: 12px; display: flex; align-items: center; gap: 8px; z-index: 20; }
        .dp { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; }
        #main-video, #main-img { width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; }
        
        .sticker {
            position: absolute; top: 200px; left: 60px; background: white;
            color: #d62976; padding: 8px 15px; border-radius: 10px;
            font-weight: bold; font-size: 22px; z-index: 100; cursor: move;
        }

        .controls { margin-top: 15px; background: #222; padding: 15px; border-radius: 15px; width: 320px; box-sizing: border-box; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #444; background: #333; color: white; box-sizing: border-box; }
        .btn { background: var(--ig-gradient); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status { font-size: 12px; color: #00ffcc; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="capture-area">
        <video id="main-video" loop playsinline crossorigin="anonymous" style="display:none;"></video>
        <img id="main-img" src="https://via.placeholder.com/1080x1920" style="display:block;">
        
        <div class="header">
            <img src="https://via.placeholder.com/50" class="dp" id="dp-preview">
            <span id="user-display" style="font-weight:600; font-size:14px; text-shadow: 1px 1px 3px #000;">User_Name</span>
        </div>

        <div class="sticker" id="drag-sticker">@<span id="mention-display">mention_id</span></div>
    </div>

    <div class="controls">
        <input type="text" id="user-in" placeholder="Edit Your Name" oninput="sync()">
        <input type="text" id="mention-in" placeholder="Mention @..." oninput="sync()">
        <input type="file" accept="image/*" onchange="loadDP(event)">
        <input type="file" accept="image/*,video/*" onchange="loadMedia(event)">
        <button class="btn" onclick="recordVideo()">Download Video (5s)</button>
        <p id="status">Ready...</p>
    </div>

    <canvas id="recorder-canvas" width="320" height="560" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('main-video');
        const img = document.getElementById('main-img');
        const canvas = document.getElementById('recorder-canvas');
        const ctx = canvas.getContext('2d');
        let isVideoMode = false;

        function sync() {
            document.getElementById('user-display').innerText = document.getElementById('user-in').value || "User_Name";
            document.getElementById('mention-display').innerText = document.getElementById('mention-in').value || "mention_id";
        }

        function loadDP(e) { document.getElementById('dp-preview').src = URL.createObjectURL(e.target.files[0]); }

        function loadMedia(e) {
            const file = e.target.files[0];
            const url = URL.createObjectURL(file);
            if(file.type.includes('video')) {
                video.src = url; video.style.display = "block"; img.style.display = "none";
                video.play(); video.muted = false; isVideoMode = true;
            } else {
                img.src = url; img.style.display = "block"; video.style.display = "none";
                isVideoMode = false;
            }
        }

        async function recordVideo() {
            const status = document.getElementById('status');
            const stream = canvas.captureStream(30);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'story.webm';
                a.click();
                status.innerText = "Downloaded!";
            };

            // Canvas drawing loop
            const draw = () => {
                if(isVideoMode) ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                else ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Draw Overlay UI on Canvas
                ctx.fillStyle = "white";
                ctx.font = "bold 20px Arial";
                const sticker = document.getElementById('drag-sticker');
                const rect = document.getElementById('capture-area').getBoundingClientRect();
                const sRect = sticker.getBoundingClientRect();
                
                // Draw Sticker
                ctx.fillRect(sRect.left - rect.left, sRect.top - rect.top, sRect.width, sRect.height);
                ctx.fillStyle = "#d62976";
                ctx.fillText("@" + document.getElementById('mention-display').innerText, (sRect.left - rect.left) + 10, (sRect.top - rect.top) + 25);
                
                if(recorder.state === 'recording') requestAnimationFrame(draw);
            };

            recorder.start();
            draw();
            status.innerText = "Recording...";
            setTimeout(() => recorder.stop(), 5000);
        }

        // Drag Logic (Same as before)
        const sticker = document.getElementById('drag-sticker');
        const box = document.getElementById('capture-area');
        const move = (e) => {
            let cx = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let cy = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            let r = box.getBoundingClientRect();
            sticker.style.left = (cx - r.left - 50) + 'px';
            sticker.style.top = (cy - r.top - 20) + 'px';
        };
        sticker.addEventListener('touchstart', () => document.addEventListener('touchmove', move, {passive:false}));
        document.addEventListener('touchend', () => document.removeEventListener('touchmove', move));
    </script>
</body>
</html>
